directive @mask(reason: String) on FIELD
directive @cacheControl(maxAge: Int!) on FIELD | QUERY | MUTATION
directive @auth(role: Role!) on FIELD | QUERY | MUTATION
directive @oneOf on INPUT_OBJECT

enum Role {
  ADMIN
  USER
}

input UserFilterInput {
  nameContains: String
  role: Role
  emails: [String!]
}

input UpdateUserInput {
  id: ID!
  name: String
  role: Role
}

input UserLookupInput @oneOf {
  id: ID
  email: String
}

type Query {
  post(id: ID!): Post
  node(id: ID!): Node
  users(limit: Int): [User!]!
  profiles(handles: [String!]!): [Profile!]!
  searchUsers(filter: UserFilterInput!, tags: [String!], role: Role): [User!]!
  lookupUser(input: UserLookupInput!): User
  viewer: User!
}

type Mutation {
  updateUser(input: UpdateUserInput!): User!
}

type Subscription {
  postUpdated(id: ID!): Post!
  userOnline: User!
}

type Post {
  id: ID!
  title: String!
  author: User!
}

interface Node {
  id: ID!
}

interface Profile {
  handle: String!
}

type CountConnection {
  count: Int!
}

type User implements Node & Profile {
  id: ID!
  handle: String!
  name: String!
  email: String!
  friends: CountConnection!
}

type Page implements Profile {
  id: ID!
  handle: String!
  likers: CountConnection!
}
