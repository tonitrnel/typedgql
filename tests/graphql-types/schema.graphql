directive @oneOf on INPUT_OBJECT

enum Role {
  ADMIN
  USER
}

input UpdateUserInput {
  id: ID!
  name: String
  role: Role
}

input UserLookupInput @oneOf {
  id: ID
  email: String
}

type Query {
  post(id: ID!): Post
  lookupUser(input: UserLookupInput!): User
  viewer: User!
}

type Mutation {
  updateUser(input: UpdateUserInput!): User!
}

type Post {
  id: ID!
  title: String!
  author: User!
}

type User {
  id: ID!
  name: String!
  email: String!
}
